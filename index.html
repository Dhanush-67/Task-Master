<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["'Sora'", "ui-sans-serif", "system-ui"],
            },
            boxShadow: {
              glow: "0 20px 70px rgba(15, 23, 42, 0.55)",
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="min-h-full bg-slate-950 text-slate-100">
    <main
      class="relative isolate min-h-screen overflow-hidden px-4 py-10 sm:px-6"
    >
      <div
        class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_top,_rgba(56,189,248,0.18),_transparent_30%),radial-gradient(circle_at_bottom_right,_rgba(244,114,182,0.14),_transparent_28%),linear-gradient(135deg,_#020617,_#0f172a_55%,_#111827)]"
      ></div>
      <div
        class="pointer-events-none absolute left-1/2 top-20 h-72 w-72 -translate-x-1/2 rounded-full bg-cyan-400/20 blur-3xl"
      ></div>

      <header class="relative mx-auto flex w-full max-w-6xl flex-col gap-6">
        <div class="grid gap-6 lg:grid-cols-[1fr_auto] lg:items-start">
          <div class="flex justify-center">
            <h1
              class="text-4xl font-semibold tracking-tight text-white sm:text-5xl"
            >
              Task Master
            </h1>
          </div>
        </div>

        <div class="flex w-full justify-between items-center gap-4">
          <div class="flex justify-start">
            <button
              id="newBookButton"
              class="inline-flex items-center justify-center rounded-2xl bg-gradient-to-r from-cyan-400 via-sky-400 to-fuchsia-400 px-5 py-3 text-sm font-semibold text-slate-950 transition duration-200 hover:scale-[1.01] hover:shadow-lg hover:shadow-cyan-500/25"
              type="button"
            >
              Add New Task
            </button>
          </div>

          <article
            class="rounded-2xl border border-white/10 bg-white/10 p-4 backdrop-blur-xl lg:min-w-40"
          >
            <p class="text-xs uppercase tracking-[0.3em] text-slate-400">
              Live tasks
            </p>
            <p id="taskCount" class="mt-3 text-3xl font-semibold text-white">
              0
            </p>
          </article>
        </div>
      </header>

      <section
        class="relative mx-auto mt-6 w-full max-w-6xl rounded-[2rem] border border-white/10 bg-white/8 p-5 shadow-glow backdrop-blur-2xl sm:p-8"
      >
        <div
          class="rounded-[1.75rem] border border-white/10 bg-slate-950/35 p-4 backdrop-blur-xl sm:p-6"
        >
          <div class="border-b border-white/10 pb-5">
            <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
              <div>
                <h2 class="text-2xl font-semibold text-white">Your to-do list</h2>
                <p class="mt-2 text-sm text-slate-400">
                  Manage tasks with server-backed storage, filters, and sorting.
                </p>
              </div>

              <div class="grid grid-cols-1 gap-3 sm:grid-cols-3">
                <label class="block">
                  <span class="mb-2 block text-xs font-medium uppercase tracking-[0.25em] text-slate-400">
                    Status
                  </span>
                  <select
                    id="statusFilter"
                    class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition focus:border-cyan-300/60 focus:bg-white/10"
                  >
                    <option value="all">All</option>
                    <option value="open">Open</option>
                    <option value="completed">Completed</option>
                  </select>
                </label>

                <label class="block">
                  <span class="mb-2 block text-xs font-medium uppercase tracking-[0.25em] text-slate-400">
                    Sort By
                  </span>
                  <select
                    id="sortBy"
                    class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition focus:border-cyan-300/60 focus:bg-white/10"
                  >
                    <option value="dueDate">Due date</option>
                    <option value="createdAt">Created</option>
                    <option value="title">Title</option>
                  </select>
                </label>

                <label class="block">
                  <span class="mb-2 block text-xs font-medium uppercase tracking-[0.25em] text-slate-400">
                    Order
                  </span>
                  <select
                    id="sortOrder"
                    class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition focus:border-cyan-300/60 focus:bg-white/10"
                  >
                    <option value="asc">Ascending</option>
                    <option value="desc">Descending</option>
                  </select>
                </label>
              </div>
            </div>
          </div>

          <div
            id="errorBanner"
            class="mt-6 hidden rounded-2xl border border-rose-400/20 bg-rose-400/10 px-4 py-3 text-sm text-rose-100"
          ></div>

          <div
            id="loadingState"
            class="mt-6 hidden rounded-3xl border border-white/10 bg-white/[0.04] px-6 py-10 text-center text-sm text-slate-300"
          >
            Loading tasks...
          </div>

          <div
            id="emptyState"
            class="mt-6 rounded-3xl border border-dashed border-white/10 bg-white/[0.04] px-6 py-16 text-center"
          >
            <p class="text-lg font-medium text-slate-200">No tasks yet</p>
            <p class="mt-2 text-sm text-slate-400">
              Add your first task to bring this board to life.
            </p>
          </div>

          <div
            id="bookshelf"
            class="mt-6 grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3"
          ></div>
        </div>
      </section>
    </main>

    <div
      id="modal"
      class="modal fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/70 px-4 backdrop-blur-md"
    >
      <div
        class="modal-content relative w-full max-w-md rounded-[1.75rem] border border-white/15 bg-slate-900/80 p-6 shadow-2xl shadow-cyan-950/40 backdrop-blur-2xl"
      >
        <button
          class="close absolute right-4 top-4 inline-flex h-10 w-10 items-center justify-center rounded-full border border-white/10 bg-white/5 text-xl text-slate-300 transition hover:border-white/20 hover:bg-white/10 hover:text-white"
          type="button"
          aria-label="Close modal"
        >
          &times;
        </button>

        <div class="pr-12">
          <p
            id="modalEyebrow"
            class="text-xs uppercase tracking-[0.35em] text-cyan-300"
          >
            Create task
          </p>
          <h2 id="modalTitle" class="mt-3 text-2xl font-semibold text-white">
            Add a new item
          </h2>
          <p id="modalDescription" class="mt-2 text-sm leading-6 text-slate-400">
            Keep it short and specific so it is easy to finish later.
          </p>
        </div>

        <form id="bookForm" class="mt-8 space-y-5">
          <label class="block">
            <span class="mb-2 block text-sm font-medium text-slate-200"
              >Title</span
            >
            <input
              class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-cyan-300/60 focus:bg-white/10"
              type="text"
              id="title"
              name="title"
              placeholder="Take out the trash"
              required
            />
          </label>

          <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
            <label class="block">
              <span class="mb-2 block text-sm font-medium text-slate-200"
                >Date</span
              >
              <input
                class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition focus:border-cyan-300/60 focus:bg-white/10"
                type="date"
                id="author"
                name="author"
                required
              />
            </label>

            <label class="block">
              <span class="mb-2 block text-sm font-medium text-slate-200"
                >Time</span
              >
              <input
                class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition focus:border-cyan-300/60 focus:bg-white/10"
                type="time"
                id="pages"
                name="pages"
                required
              />
            </label>
          </div>

          <button
            id="submitButton"
            class="w-full rounded-2xl bg-gradient-to-r from-cyan-400 via-sky-400 to-fuchsia-400 px-5 py-3 text-sm font-semibold text-slate-950 transition duration-200 hover:scale-[1.01] hover:shadow-lg hover:shadow-cyan-500/20"
            type="submit"
          >
            Save Task
          </button>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
